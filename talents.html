<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AintSaint Talents</title>
    <meta name="description" content="Lihat 7 talent DJ AintSaint dari SinnersNight, WestSidePeople, dan Hybrid direction.">
    <meta property="og:title" content="AintSaint Talents">
    <meta property="og:description" content="Talent DJ AintSaint dengan genre global sound, local Indonesia sound, dan hybrid switch.">
    <meta property="og:image" content="assets/img/hero/home-hero.jpg">
    <link rel="icon" href="assets/img/logos/aintsaint-logo.png">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/animations.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
  </head>
  <body data-page="talents">
    <div id="site-header"></div>
    <main>
      <section class="hero hero--subpage">
        <div class="container hero__simple reveal">
          <h1>AintSaint Talents</h1>
          <p>7 talent dengan karakter sound berbeda untuk SinnersNight, WestSidePeople, dan Hybrid direction.</p>
        </div>
      </section>

      <section class="section section--tight">
        <div class="container">
          <div class="filter-bar">
            <div class="segmented-control" aria-label="Filter talents by division">
              <button class="is-active" type="button" data-talent-filter="All">All</button>
              <button type="button" data-talent-filter="SinnersNight">SinnersNight</button>
              <button type="button" data-talent-filter="WestSidePeople">WestSidePeople</button>
              <button type="button" data-talent-filter="Hybrid">Hybrid</button>
            </div>
            <label class="search-field">
              <span>Search</span>
              <input id="talent-search" type="search" placeholder="Search by name or genre">
            </label>
          </div>
          <div id="talent-grid" class="card-grid"></div>
        </div>
      </section>

      <section class="section section--cta">
        <div class="container cta-band reveal">
          <div>
            <h2>Need help choosing the right DJ?</h2>
            <p>Kirim detail acara, crowd, venue, dan budget. AintSaint akan bantu pilih talent dan sound direction.</p>
          </div>
          <a class="btn btn-light" href="booking.html">Book Talent</a>
        </div>
      </section>
    </main>
    <div id="site-footer"></div>
    <a class="floating-whatsapp" href="booking.html" aria-label="Chat WhatsApp AintSaint" data-whatsapp-link><img src="assets/icons/whatsapp.svg" alt=""></a>
    <script src="assets/js/data-loader.js"></script>
    <script src="assets/js/utils.js"></script>
    <script src="assets/js/main.js"></script>
    <script src="assets/js/render-talents.js"></script>
  </body>
</html>
